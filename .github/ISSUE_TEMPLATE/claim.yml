name: Claim an E156 paper
description: Claim a paper to rewrite and submit to Synthēsis
title: "[CLAIM #____] "
labels: [claim]
body:
  - type: markdown
    attributes:
      value: |
        ## Claim a paper
        Rewrite the 156-word body in your own words, then submit to **◆ Synthēsis** ([synthesis-medicine.org](https://www.synthesis-medicine.org/index.php/journal)) — section **"Methods Note"** (≤400 words main text, OJS submission system).

        **One paper at a time.** You may hold AT MOST one active claim until you either submit or let it expire.
        You have **30 days** from claim to submission. If you need more time, request the **+10-day auto-approved extension** from your paper card (40 days total). After that, your claim expires and the paper reopens for another student.

        > Full step-by-step OJS submission instructions are on the [student board](https://mahmood726-cyber.github.io/e156/students.html#how-to-submit) and in the SUBMISSION METADATA block of your paper's workbook entry.

        ### Authorship (mandatory)
        - **You are first author.**
        - You must nominate a **senior / last author** — typically your faculty supervisor or a co-investigator from your institution.
        - **Mahmood Ahmad will appear as a middle author only — never first, never last.** This is a fixed rule across the whole workbook (Conceptualization, Methodology, Software, Data curation; not original drafting).
        - **Competing interests note (auto-included on submission):** *MA serves on the editorial board of Synthēsis (the target journal); MA had no role in editorial decisions on this manuscript, which was handled by an independent editor of the journal.*

  - type: input
    id: paper_number
    attributes:
      label: Paper number
      description: The number on the card you clicked (e.g. 123)
      placeholder: "123"
    validations:
      required: true

  - type: input
    id: paper_title
    attributes:
      label: Paper title (short)
      description: Auto-filled from the card. Leave as-is if correct.
    validations:
      required: false

  - type: input
    id: name
    attributes:
      label: Your name
      placeholder: "e.g. Asha Bint"
    validations:
      required: true

  - type: input
    id: affiliation
    attributes:
      label: Your affiliation / university
      placeholder: "e.g. Makerere University, Kampala"
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: Your email
      placeholder: "you@example.com"
    validations:
      required: true

  - type: input
    id: orcid
    attributes:
      label: Your ORCID (optional, free to create at orcid.org)
      placeholder: "0000-0000-0000-0000"
    validations:
      required: false

  - type: input
    id: senior_author
    attributes:
      label: Senior / last author (faculty supervisor)
      description: |
        Name + affiliation of the faculty supervisor who will be your senior author. Mahmood Ahmad cannot fill this role — must be someone else.

        **No supervisor available yet?** Type exactly `TBD - request mentor` and Mahmood will help nominate a faculty co-investigator from the E156 advisory pool before you submit. You can still claim the paper now; just don't submit to the journal until the senior author is filled in.
      placeholder: "e.g. Dr. Jane Okello, Makerere University  (or  TBD - request mentor)"
    validations:
      required: true

  - type: checkboxes
    id: agreements
    attributes:
      label: I understand
      options:
        - label: I will rewrite the 156-word body in my own words (7 sentences, 156 words max)
          required: true
        - label: Target journal is Synthēsis (synthesis-medicine.org), section preassigned per paper in the workbook
          required: true
        - label: I have 30 days to submit (extendable by 10 days on request — 40 days total) before my claim expires and the paper reopens
          required: true
        - label: I will claim ONLY this paper until I submit or let this claim expire (one-at-a-time rule)
          required: true
        - label: I will be listed as first author on the submission
          required: true
        - label: I have nominated a senior / last author (faculty supervisor) above. Mahmood Ahmad will be a middle author only — never first, never last.
          required: true
        - label: I will include the competing-interests statement "MA serves on the editorial board of Synthēsis (the target journal); MA had no role in editorial decisions on this manuscript, which was handled by an independent editor of the journal."
          required: true
