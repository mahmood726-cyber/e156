name: Confirm submission to Synthēsis
description: Report that you've submitted your rewrite to the journal
title: "[SUBMITTED #____] "
labels: [submitted]
body:
  - type: markdown
    attributes:
      value: |
        ## Confirm submission
        Use this after you've submitted your rewrite to Synthēsis.
        This marks the paper as SUBMITTED on the student board and locks in your first-authorship.

  - type: input
    id: paper_number
    attributes:
      label: Paper number
      description: Same number you used when you claimed the paper
      placeholder: "123"
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Your name (must match your original claim)
    validations:
      required: true

  - type: input
    id: submission_id
    attributes:
      label: Submission confirmation / manuscript ID / DOI
      description: Whatever the journal gave you when you submitted — ID number, DOI link, or manuscript tracking code.
      placeholder: "e.g. 12345 or https://doi.org/10.xxxx/..."
    validations:
      required: true

  - type: input
    id: submit_date
    attributes:
      label: Date of submission (YYYY-MM-DD)
      placeholder: "2026-05-15"
    validations:
      required: true

  - type: input
    id: senior_author_final
    attributes:
      label: Senior / last author on the submitted manuscript (MUST NOT be "TBD")
      description: |
        The faculty supervisor who is listed as last author on the version you just submitted to Synthēsis.
        If your claim had "TBD - request mentor" and no faculty was assigned, STOP — do not submit yet. Contact Mahmood so a senior author from the E156 advisory pool can be nominated first.
      placeholder: "e.g. Dr. Jane Okello, Makerere University"
    validations:
      required: true

  - type: textarea
    id: final_body
    attributes:
      label: Final 156-word body as submitted
      description: |
        Paste the 156-word / 7-sentence main body exactly as it appears in your OJS submission. This is checked by a validator to confirm you did not pad to 400 words — a "format-violation" label will block the auto-update until you fix it.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Any notes (optional)
      placeholder: "e.g. pre-review feedback, questions, comments"
    validations:
      required: false
